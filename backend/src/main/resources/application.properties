# Databáze si bere údaje z nastavení serveru
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}

# Hibernate nastavení (nepřepisovat tabulky, jen updatovat, data už máme)
spring.jpa.hibernate.ddl-auto=update

# Dovolíme cloudu nastavit si vlastní port (pokud ho nenastaví, použije 8080)
server.port=${PORT:8080}
